# SOPS KDF Configuration
# Define path-based access rules for secrets
# Keys are automatically derived from the key names used in rules
# Note: The 'project' key is automatically added to all rules

rules:
  # Server 1 specific secrets
  # Decryptable by: project + server_1
  - path_regex: secrets/server-1/[^/]+\.(yaml|json|env|ini)$
    keys:
      - server_1

  # Server 2 specific secrets
  # Decryptable by: project + server_2
  - path_regex: secrets/server-2/[^/]+\.(yaml|json|env|ini)$
    keys:
      - server_2

  # Common secrets accessible by both servers
  # Decryptable by: project + server_1 + server_2
  - path_regex: secrets/common/[^/]+\.(yaml|json|env|ini)$
    keys:
      - server_1
      - server_2

  # Staging environment secrets
  # Decryptable by: project + staging
  - path_regex: secrets/staging/[^/]+\.(yaml|json|env|ini)$
    keys:
      - staging

  # Production environment secrets
  # Decryptable by: project + prod
  - path_regex: secrets/prod/[^/]+\.(yaml|json|env|ini)$
    keys:
      - prod

  # Default rule for any other files (only project key)
  - path_regex: .*
    keys: []
